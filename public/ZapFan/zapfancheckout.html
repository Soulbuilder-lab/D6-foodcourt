<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Zapfan</title>
  <link rel="stylesheet" href="/ZapFan/css/zapfancheckout.css">
  <link rel="shortcut icon" href="/ZapFan/images/logo zapfan.jpg">
  <script type="module">
    import { auth, db } from '/js/firebase-config.js';
  
    window.firebaseAuth = auth;
    window.firebaseDb = db;
  </script>
  <script src="/js/config.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-area">
      <img src="/ZapFan/images/logo zapfan.jpg" alt="Zapfan Logo">
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <nav class="main-navbar">
      <div style="display:flex; align-items:center;">
        <a href="/ZapFan/zapfancart.html" class="previous-btn"><ion-icon name="arrow-back-outline"></ion-icon></a>
        <h2 class="page-title">Checkout</h2>
      </div>
      <div class="profile">
        <div class="cart"><ion-icon name="cart-outline"></ion-icon>
          <span id="cart-count" class="cart-count">0</span>
        </div>
      </div>
    </nav>

    <div class="checkout-container">
      <!-- Left: Form -->
      <div class="checkout-form-section">
        <h3><ion-icon name="document-text-outline"></ion-icon> Payment Details</h3>
        <form id="checkout-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="e.g. 012-3456789" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="text" id="email" placeholder="e.g. your.email@gmail.com" required>
          </div>
          <div class="form-group">
            <label>Payment Method</label>
            <div class="payment-options">
              <label class="radio-label">
                <input type="radio" name="payment" value="cash" checked> Pay at Counter
              </label>
            </div>
          </div>
          <button type="submit" class="confirm-btn">
            <ion-icon name="checkmark-circle-outline"></ion-icon> Confirm Order
          </button>
        </form>
      </div>

      <!-- Right: Summary -->
      <div class="checkout-summary-section">
        <div class="summary-card">
          <h3><ion-icon name="list-outline"></ion-icon> Order Summary</h3>
          <div id="checkout-items"></div>
          <div class="summary-totals">
            <p>Subtotal <span id="checkout-subtotal">RM 0.00</span></p>
            <p>Tax (6%) <span id="checkout-tax">RM 0.00</span></p>
            <p class="grand-total">Total <span id="checkout-total">RM 0.00</span></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js""></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js""></script>
  <script src="/ZapFan/js/zapfancheckout.js"></script>
</html>
