<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="/TheGoldenBowl/images/logo.jpg">
    <link rel="stylesheet" href="/TheGoldenBowl/css/thegoldenbowlcart.css">
    <script type="module">
        import { auth, db } from '/js/firebase-config.js';
  
        window.firebaseAuth = auth;
        window.firebaseDb = db;
    </script>
    <title>Restaurant | The Golden Bowl - Cart</title>
</head>
<body class="cart-page">

    <div class="sidebar">
        <div class="logo-area">
            <img src="/TheGoldenBowl/images/logo.jpg" alt="Logo"> 
        </div>
    </div>
    <div class="main-content">
        
        <header class="top-header">
            <ion-icon class="menu-toggle" name="menu-outline"></ion-icon>

            <div class="user-actions">
                <a href="/TheGoldenBowl/index.html" class="previous-btn" title="Go Back">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                </a>
                
                <a href="/TheGoldenBowl/thegoldenbowlcart.html" class="cart-icon-wrapper">
                    <ion-icon name="cart-outline"></ion-icon>
                    <span class="cart-count" id="header-cart-count">0</span>
                </a>
            </div>
        </header>

        <div class="cart-container">
            <div class="cart-items-section">
                <h2>Order Summary</h2>
                <div id="cart-list">
                    
                </div>
            </div>

            <div class="checkout-section">
                <div class="checkout-card">
                    <h3>Payment Details</h3>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal-price">RM 0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (6%)</span>
                        <span id="tax-price">RM 0.00</span>
                    </div>
                    <hr>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total-price">RM 0.00</span>
                    </div>
                    
                    <div class="coupon-area">
                        <input type="text" placeholder="Promote Code">
                        <button class="apply-btn">Apply</button>
                    </div>

                    <button class="empty-cart-btn" onclick="emptyCart()">
                        <ion-icon name="trash-outline"></ion-icon>
                        Empty Cart
                    </button>

                    <button class="checkout-btn" onclick="window.location.href='/TheGoldenBowl/thegoldenbowlcheckout.html'">Checkout</button>
                </div>
            </div>
        </div>
    </div>

</body>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>

    <script src="/TheGoldenBowl/js/thegoldenbowlcart.js"></script>

</html>
