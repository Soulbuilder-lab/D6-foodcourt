<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Zapfan</title>
  <link rel="stylesheet" href="/ZapFan/css/zapfancart.css">
  <link rel="shortcut icon" href="/ZapFan/images/logo zapfan.jpg">
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.2/firebase-database.js"></script>
  <script type="module">
    import { auth, db } from './firebase-config.js';
  
    window.firebaseAuth = auth;
    window.firebaseDb = db;
  </script>
</head>
<body class="cart-page">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-area">
      <img src="/ZapFan/images/logo zapfan.jpg" alt="Zapfan Logo">
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-header">
      <div style="display:flex; align-items:center;">
        <a href="/ZapFan/zapfan.html" class="previous-btn"><ion-icon name="arrow-back-outline"></ion-icon></a>
      </div>
      <div class="user-actions">
        <div class="cart-icon-wrapper">
          <ion-icon name="cart-outline"></ion-icon>
          <span id="header-cart-count" class="cart-count">0</span>
        </div>
      </div>
    </header>

    <div class="cart-container">
      <!-- Left: Cart Items -->
      <section class="cart-items-section">
        <h2>Order Items</h2>
        <div id="cart-list">
          <!-- JS will inject items here -->
        </div>
      </section>

      <!-- Right: Summary & Checkout -->
      <aside class="checkout-card">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal-price">RM 0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (6%)</span>
          <span id="tax-price">RM 0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total-price">RM 0.00</span>
        </div>
        
        <div class="coupon-area">
          <input type="text" placeholder="Coupon Code">
          <button class="apply-btn">Apply</button>
        </div>

        <button class="empty-cart-btn" onclick="emptyCart()">
          <ion-icon name="trash-outline"></ion-icon> Empty Cart
        </button>
        <button class="checkout-btn" onclick="goCheckout()">Proceed To Checkout</button>
      </aside>
    </div>
  </main>

</body>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script src="/ZapFan/js/zapfancart.js"></script>
</html>
